<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selamanya Untuk Papari Dede 🌸</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    margin: 0;
    overflow-x: hidden;
}

/* FIX SCROLL */
html, body {
    height: auto;
    overflow-y: auto;
}

/* INTRO FIX */
#intro {
    position: fixed;
    inset: 0;
    background: #fff5f7;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 99999;
    transition: opacity 1s ease;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
    <h1>Sentuh Layar 💖</h1>
</div>

<!-- ISI -->
<div style="height:2000px; padding:20px;">
    <h1>Website Kamu Sudah Bisa Scroll 🎉</h1>
</div>

<!-- AUDIO -->
<audio id="musik" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const music = document.getElementById("musik");
const intro = document.getElementById("intro");

let started = false;

function startAll() {
    if (started) return;
    started = true;

    // PLAY MUSIC
    music.play().catch(() => {});

    // HILANGKAN INTRO
    intro.style.opacity = "0";
    intro.style.pointerEvents = "none";

    setTimeout(() => {
        intro.style.display = "none";
    }, 1000);
}

// EVENT HP & DESKTOP
window.addEventListener("click", startAll);
window.addEventListener("touchstart", startAll);
</script>

</body>
</html>
