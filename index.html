<!DOCTYPE html>
<html lang="id" style="height: auto !important; overflow-y: auto !important;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selamanya Untuk Papari Dede 🌸</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Quicksand:wght@300;400;500;700&family=Pangolin&display=swap" rel="stylesheet">
    <style>
        :root {
            --sakura-pink: #f7b7c4;
            --sakura-dark: #e78799;
            --bg-gradient: linear-gradient(180deg, #fff5f7 0%, #ffffff 100%);
        }

        /* JURUS TERAKHIR AGAR BISA SCROLL */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            /* Memaksa browser mengizinkan scroll */
            overflow-x: hidden !important;
            overflow-y: auto !important;
            height: auto !important;
            min-height: 100% !important;
            position: relative;
            -webkit-overflow-scrolling: touch;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: var(--bg-gradient);
            color: #555;
            cursor: pointer;
        }
